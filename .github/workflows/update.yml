name: Aggiorna Dashboard Normativa

on:
  schedule:
    # Ogni giorno alle 07:00 ora italiana (06:00 UTC in inverno, 05:00 UTC in estate)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Permette esecuzione manuale dal tab Actions di GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # necessario per il commit dei dati aggiornati

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Fetch nuovi atti normativi
        run: python -c "import sys; sys.path.insert(0,'scripts'); from fetch_sources import run; run()"

      - name: Elabora con AI (OpenRouter / Gemini Flash)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -c "import sys; sys.path.insert(0,'scripts'); from process_with_ai import run; run()"

      - name: Commit dati aggiornati
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/notizie.json data/seen_ids.json data/raw_items.json
          git diff --staged --quiet || git commit -m "update: notizie $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
